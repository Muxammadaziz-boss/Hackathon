<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5DAB2E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A8C25;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bgGrad)"/>
  
  <!-- H Letter - bold white -->
  <text x="32" y="45" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">H</text>
  
  <!-- Small accent dot -->
  <circle cx="52" cy="14" r="4" fill="#F59E0B"/>
</svg>